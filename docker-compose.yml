services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-restaurant_pwa}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./backend/database/seeds.sql:/docker-entrypoint-initdb.d/seeds.sql
    networks:
      - restaurant_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: restaurant_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - restaurant_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Express + Node)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: restaurant_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-restaurant_pwa}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      # FIX AUDITORÍA: CORS_ORIGIN no se pasaba al contenedor.
      # Sin esto, el backend usa el fallback 'http://localhost:5173'
      # que solo funciona si accedes desde la misma máquina.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/dist:/app/dist
      - /app/node_modules
    networks:
      - restaurant_network
    command: npm run dev

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurant_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    networks:
      - restaurant_network
    environment:
      - VITE_API_URL=http://localhost:3001/api
      # FIX AUDITORÍA: VITE_WS_URL faltaba — los hooks useWebSocket,
      # useCajaWebSocket, useKitchenSocket y useWaiterWebSocket
      # usaban el fallback 'ws://localhost:3001' que solo funciona
      # desde la misma máquina. En red o con dominio propio, falla.
      - VITE_WS_URL=ws://localhost:3001

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  restaurant_network:
    driver: bridge